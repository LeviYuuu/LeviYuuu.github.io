<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>笔尖凝思。</title>
    <link rel="icon" href="1.png" type="image/x-icon">
    <link rel="stylesheet" href="style1.css">
</head>

<body>
    <!-- 背景层 -->
    <div class="bg-all">
        <img id="bg" src="background3.jpg" alt="背景">
    </div>

    <section class="diary">
        <header>
            <h1>好多问题还没有解答。</h1>
            <p class="header-sub">笔尖凝思 · 随笔记录</p>
        </header>

        <!-- 操作栏（始终可见） -->
        <div class="diary-actions">
            <span class="sync-status" id="syncStatus" style="display:none;"></span>
            <button class="btn-new-diary" id="btnNewDiary">+ 写日记</button>
        </div>

        <!-- 日记列表容器 -->
        <div id="diaryList"></div>

    </section>

    <!-- 写日记弹窗 -->
    <div class="modal-overlay" id="modalOverlay">
        <div class="modal-box">
            <div class="modal-header">
                <h2>写一篇日记</h2>
                <button class="modal-close" id="modalClose">&times;</button>
            </div>
            <div class="modal-body">
                <input type="text" id="diaryTitle" class="modal-input" placeholder="日期标题，如 2026 4.27">
                <textarea id="diaryContent" class="modal-textarea" placeholder="写下你想说的话..." rows="8"></textarea>
                <p class="modal-hint">换行请直接按回车，保存后会自动处理。</p>
            </div>
            <div class="modal-footer">
                <button class="btn-cancel" id="btnCancel">取消</button>
                <button class="btn-save" id="btnSave">保存</button>
            </div>
        </div>
    </div>

    <!-- 密码确认弹窗 -->
    <div class="modal-overlay" id="passwordOverlay">
        <div class="modal-box password-box">
            <div class="modal-header">
                <h2>验证身份</h2>
                <button class="modal-close" id="passwordClose">&times;</button>
            </div>
            <div class="modal-body">
                <input type="password" id="passwordInput" class="modal-input" placeholder="输入密码">
                <p class="password-hint" id="passwordHint" style="display:none;"></p>
            </div>
            <div class="modal-footer">
                <button class="btn-cancel" id="passwordCancel">算了</button>
                <button class="btn-save" id="passwordConfirm">确认</button>
            </div>
        </div>
    </div>

    <footer>
        <p><a href="../index.html" class="back-to-home">返回首页</a></p>
    </footer>

    <script src="diary-data.js"></script>
    <script src="diary-store.js"></script>
    <script src="diary-app.js"></script>
</body>

</html>
